<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cierre — ¿Qué se apaga?</title>
<style>
  :root{
    --bg:#070707;
    --accent:#5b9bd5;
    --ink:#e9e9e6;
    --ink-dim: rgba(233,233,230,0.30);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    background:var(--bg);
    font-family: Georgia, 'Times New Roman', serif;
    color:var(--ink);
  }

  .closing-block{
    position:relative;
    height: clamp(850px, 92vh, 950px);
    width:100%;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .ambient{
    position:absolute; inset:0;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(91,155,213,0.07) 0%, rgba(0,0,0,0) 70%);
  }

  .vignette{
    position:absolute; inset:0;
    box-shadow: inset 0 0 18vw 4vw rgba(0,0,0,0.85);
    pointer-events:none;
  }

  .stage{
    position:relative;
    width:100%;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 8%;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  /* Pregunta inicial */
  .question{
    font-size: clamp(1.4rem, 3.4vw, 2.2rem);
    font-style: italic;
    line-height:1.5;
    color: var(--ink);
    opacity:0;
    transform: translateY(10px);
    transition: opacity 1.6s ease, transform 1.6s ease;
  }
  .question.in-view{ opacity:1; transform:translateY(0); }
  .question::after{
    content:"";
    display:block;
    width:42px; height:1px;
    background:var(--accent);
    margin:24px auto 0;
    box-shadow: 0 0 8px rgba(91,155,213,0.5);
    opacity:0.85;
  }

  /* Palabras apiladas */
  .word-list{
    margin-top: 56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 28px;
  }

  .word{
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight:400;
    letter-spacing: 0.5px;
    color: var(--ink-dim);
    text-transform:lowercase;
    opacity:0;
    transform: translateY(14px);
    transition: opacity 1.3s ease, transform 1.3s ease, color 1.3s ease, letter-spacing 1.3s ease;
  }

  .word .underline{
    display:block;
    margin: 12px auto 0;
    height:1px;
    width:0%;
    background: var(--accent);
    box-shadow: 0 0 0px var(--accent);
    opacity:0;
    transition: width 1.1s ease, box-shadow 1.1s ease, opacity 1.1s ease;
  }

  .word.lit{
    opacity:1;
    transform: translateY(0);
    color: var(--ink);
    letter-spacing: 1.2px;
  }
  .word.lit .underline{
    width:48px;
    opacity:0.9;
    box-shadow: 0 0 10px rgba(91,155,213,0.55);
  }

  /* Frase final */
  .closing-text{
    margin-top: 64px;
    max-width: 620px;
    opacity:0;
    transform: translateY(10px);
    transition: opacity 1.8s ease, transform 1.8s ease;
  }
  .closing-text.in-view{ opacity:1; transform:translateY(0); }
  .closing-text p{
    font-size: clamp(1rem, 2.1vw, 1.35rem);
    line-height:1.7;
    color:#f1f1ef;
    letter-spacing:0.2px;
  }
  .closing-text p::before{
    content:"";
    display:block;
    width:42px; height:1px;
    background:var(--accent);
    margin:0 auto 26px;
    box-shadow: 0 0 8px rgba(91,155,213,0.5);
  }

  @media (prefers-reduced-motion: reduce){
    .word, .closing-text, .question{ transition:none; }
  }

  @media (max-width:640px){
    .word{ font-size: clamp(1.5rem, 7vw, 2.2rem); }
    .question{ font-size: clamp(1.15rem, 5vw, 1.7rem); }
    .word-list{ gap:22px; margin-top:42px; }
    .closing-text{ margin-top:48px; }
  }
</style>
</head>
<body>

<div class="closing-block" id="closing-block">
  <div class="ambient"></div>
  <div class="vignette"></div>

  <div class="stage">
    <div class="question" id="question">¿Qué se apaga cuando un investigador deja la ciencia?</div>

    <div class="word-list">
      <div class="word" id="w1">experiencia<span class="underline"></span></div>
      <div class="word" id="w2">proyectos<span class="underline"></span></div>
      <div class="word" id="w3">formación<span class="underline"></span></div>
      <div class="word" id="w4">futuro<span class="underline"></span></div>
    </div>

    <div class="closing-text" id="closing-text">
      <p>Chile no pierde talento por falta de capacidad.<br>
      Lo pierde cuando obliga a sus científicos a construir futuro sin estabilidad.</p>
    </div>
  </div>
</div>

<script>
(function(){
  var block = document.getElementById('closing-block');
  var question = document.getElementById('question');
  var words = [
    document.getElementById('w1'),
    document.getElementById('w2'),
    document.getElementById('w3'),
    document.getElementById('w4')
  ];
  var closingText = document.getElementById('closing-text');

  var WORD_DELAY = 550;   // retraso entre cada palabra (ms)
  var START_DELAY = 700;  // retraso antes de la primera palabra, tras mostrar la pregunta (ms)
  var CLOSING_DELAY = 900; // retraso de la frase final tras la última palabra (ms)

  var played = false;

  function playSequence(){
    if(played) return;
    played = true;

    question.classList.add('in-view');

    words.forEach(function(el, i){
      setTimeout(function(){
        el.classList.add('lit');
      }, START_DELAY + i * WORD_DELAY);
    });

    var lastWordTime = START_DELAY + (words.length - 1) * WORD_DELAY;
    setTimeout(function(){
      closingText.classList.add('in-view');
    }, lastWordTime + CLOSING_DELAY);
  }

  if('IntersectionObserver' in window){
    var observer = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          playSequence();
          observer.disconnect();
        }
      });
    }, { threshold: 0.35 });

    observer.observe(block);
  } else {
    // Respaldo si IntersectionObserver no está disponible
    playSequence();
  }
})();
</script>

</body>
</html>
