<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonio Matías Muñoz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
font-family:Georgia, serif;
color:#fff;
padding:35px 38px;
}

.player{
display:flex;
align-items:center;
gap:32px;
width:100%;
}

button{
width:105px;
height:105px;
border-radius:50%;
border:3px solid #fff;
background:none;
color:#fff;
font-size:42px;
cursor:pointer;
flex-shrink:0;
}

.info{
flex:1;
width:100%;
}

h2{
font-size:44px;
font-weight:normal;
line-height:1.3;
margin-bottom:28px;
color:#fff;
}

.wave{
display:flex;
align-items:flex-end;
gap:7px;
height:58px;
width:100%;
}

.wave span{
flex:1;
max-width:8px;
background:#fff;
border-radius:10px;
}

.wave span:nth-child(odd){height:26px;}
.wave span:nth-child(even){height:48px;}
.wave span:nth-child(3n){height:36px;}
.wave span:nth-child(5n){height:56px;}

.playing .wave span{
animation:wave 0.8s ease-in-out infinite;
}

.playing .wave span:nth-child(even){
animation-delay:.2s;
}

@keyframes wave{
0%,100%{transform:scaleY(.5);}
50%{transform:scaleY(1.2);}
}
</style>
</head>

<body>

<div class="player" id="player">
<button id="play">▶</button>

<div class="info">
<h2>
Escucha el testimonio de Matías Muñoz<br>
y conoce cómo la inestabilidad laboral afecta a quienes investigan en Chile.
</h2>

<div class="wave">
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
</div>
</div>
</div>

<audio id="audio" preload="auto">
<source src="https://github.com/aravenaynz-hue/reportaje-multimedia/raw/refs/heads/main/Cun%CC%83a%20Matias%20inestabilidad%20laboral.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("play");
const player = document.getElementById("player");

btn.onclick = () => {
  if (audio.paused) {
    audio.play();
    btn.innerHTML = "❚❚";
    player.classList.add("playing");
  } else {
    audio.pause();
    btn.innerHTML = "▶";
    player.classList.remove("playing");
  }
};

audio.onended = () => {
  btn.innerHTML = "▶";
  player.classList.remove("playing");
};
</script>

</body>
</html>
