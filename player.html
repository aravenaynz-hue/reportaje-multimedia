<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Testimonio Matías Muñoz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:transparent;
font-family:Georgia, serif;
color:#fff;
padding:25px;
}

.player{
display:flex;
align-items:center;
gap:22px;
width:100%;
}

button{
width:70px;
height:70px;
border-radius:50%;
border:2px solid #fff;
background:none;
color:#fff;
font-size:28px;
cursor:pointer;
flex-shrink:0;
}

.info{
flex:1;
}

h2{
font-size:30px;
font-weight:normal;
line-height:1.3;
margin-bottom:18px;
color:white;
}

audio{
display:none;
}

.wave{
display:flex;
align-items:flex-end;
gap:4px;
height:45px;
}

.wave span{
width:5px;
background:white;
border-radius:10px;
animation:wave 1s ease-in-out infinite;
}

.wave span:nth-child(1){height:15px;}
.wave span:nth-child(2){height:35px;}
.wave span:nth-child(3){height:22px;}
.wave span:nth-child(4){height:42px;}
.wave span:nth-child(5){height:18px;}
.wave span:nth-child(6){height:30px;}
.wave span:nth-child(7){height:40px;}
.wave span:nth-child(8){height:20px;}
.wave span:nth-child(9){height:38px;}
.wave span:nth-child(10){height:24px;}
.wave span:nth-child(11){height:34px;}
.wave span:nth-child(12){height:18px;}
.wave span:nth-child(13){height:42px;}
.wave span:nth-child(14){height:26px;}
.wave span:nth-child(15){height:36px;}

@keyframes wave{
0%,100%{transform:scaleY(.6);}
50%{transform:scaleY(1);}
}
</style>
</head>

<body>

<div class="player">

<button id="play">▶</button>

<div class="info">

<h2>
Escucha el testimonio de Matías Muñoz<br>
y conoce cómo la inestabilidad laboral afecta a quienes investigan en Chile.
</h2>

<div class="wave">
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
</div>

</div>

</div>

<audio id="audio">
<source src="https://raw.githubusercontent.com/aravenaynz-hue/reportaje-multimedia/main/Cu%C3%B1a%20Matias%20inestabilidad%20laboral.mp3" type="audio/mpeg">
</audio>

<script>

const audio=document.getElementById("audio");
const btn=document.getElementById("play");

btn.onclick=()=>{

if(audio.paused){
audio.play();
btn.innerHTML="❚❚";
}else{
audio.pause();
btn.innerHTML="▶";
}

}

audio.onended=()=>{
btn.innerHTML="▶";
}

</script>

</body>
</html>
